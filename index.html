<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PaWa Data Solutions helps mid-market teams integrate, govern, and activate trusted data—fast. From pipelines to AI readiness, get measurable outcomes in weeks, not months." />
    <title>PaWa Data Solutions — Trusted Data, Delivered Fast</title>
    <link rel="canonical" href="https://pawadata.com/" />

    <!-- Open Graph / Facebook / LinkedIn -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PaWa Data Solutions" />
    <meta property="og:title" content="PaWa Data Solutions — Trusted Data, Delivered Fast" />
    <meta property="og:description" content="We help mid-market teams integrate, govern, and activate trusted data—fast. From pipelines to AI readiness, measurable outcomes in weeks." />
    <meta property="og:url" content="https://pawadata.com/" />
    <meta property="og:image" content="https://pawadata.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="PaWa Data Solutions — Trusted Data, Delivered Fast" />
    <meta name="twitter:description" content="We help mid-market teams integrate, govern, and activate trusted data—fast. From pipelines to AI readiness, measurable outcomes in weeks." />
    <meta name="twitter:image" content="https://pawadata.com/og-image.png" />

    <!-- Organization structured data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "PaWa Data Solutions",
      "url": "https://pawadata.com/",
      "logo": "https://pawadata.com/pawa-logo.png",
      "image": "https://pawadata.com/og-image.png",
      "description": "Data consultancy helping mid-market teams integrate, govern, and activate trusted data — from pipelines to AI readiness.",
      "email": "hello@pawadata.com",
      "telephone": "+1-416-887-2811",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "628 Fleet Street, Suite 2803",
        "addressLocality": "Toronto",
        "addressRegion": "ON",
        "addressCountry": "CA"
      },
      "areaServed": ["CA", "US", "Worldwide"],
      "knowsLanguage": ["en", "fr", "es", "pt"]
    }
    </script>
  </head>
  <body>
    <!--
      Hidden static forms for Netlify build-time form detection.
      The live React forms submit via AJAX to these form names.
      https://docs.netlify.com/forms/setup/#javascript-forms
    -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="company" />
      <input type="text" name="phone" />
      <textarea name="message"></textarea>
      <input type="text" name="language" />
    </form>

    <form name="job-application" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="full_name" />
      <input type="email" name="email" />
      <input type="text" name="phone" />
      <input type="text" name="position" />
      <input type="text" name="experience_level" />
      <input type="text" name="location" />
      <input type="text" name="remote_preference" />
      <input type="file" name="resume" />
      <textarea name="cover_letter"></textarea>
      <input type="url" name="linkedin_url" />
      <input type="url" name="portfolio_url" />
      <input type="text" name="availability" />
      <input type="text" name="language" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
