<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://base44.com/logo_v2.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pawa Data Solutions</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Netlify Forms detection (hidden at runtime) -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="contact" />
      <input name="bot-field" />
      <input name="name" />
      <input name="email" />
      <input name="company" />
      <input name="phone" />
      <textarea name="message"></textarea>
    </form>

    <form name="job-application" netlify netlify-honeypot="bot-field" hidden enctype="multipart/form-data">
      <input type="hidden" name="form-name" value="job-application" />
      <input name="bot-field" />
      <input name="full_name" />
      <input name="email" />
      <input name="phone" />
      <input name="location" />
      <input name="availability" />
      <input name="linkedin_url" />
      <input name="portfolio_url" />
      <input name="cover_letter" />
      <input type="file" name="resume" />
    </form>
  </body>
</html>
